name: marketwatcher

x-backend-base: &backend-base
  build:
    context: .
    dockerfile: docker/app/Dockerfile
  working_dir: /var/www/html
  volumes:
    - ./backend:/var/www/html
  environment:
    APP_ENV: local
    APP_DEBUG: "true"
    APP_URL: http://localhost:8000
    DB_CONNECTION: pgsql
    DB_HOST: postgres
    DB_PORT: 5432
    DB_DATABASE: marketwatcher
    DB_USERNAME: marketwatcher
    DB_PASSWORD: marketwatcher
    REDIS_HOST: redis
    REDIS_PORT: 6379
    CACHE_STORE: redis
    SESSION_DRIVER: redis
    QUEUE_CONNECTION: redis
    MAIL_MAILER: smtp
    MAIL_HOST: mailpit
    MAIL_PORT: 1025
    MAIL_ENCRYPTION: "null"
    SANCTUM_STATEFUL_DOMAINS: localhost:5173,127.0.0.1:5173
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started

services:
  app:
    <<: *backend-base
    container_name: marketwatcher-app
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "8000:8000"

  queue:
    <<: *backend-base
    container_name: marketwatcher-queue
    restart: unless-stopped
    command: php artisan queue:work --verbose --tries=1 --timeout=1200 --sleep=2 --backoff=5
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    <<: *backend-base
    container_name: marketwatcher-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: marketwatcher-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -lc "npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_APP_NAME: FinWise
      VITE_API_BASE_URL: /api
      VITE_API_PROXY_TARGET: http://app:8000
    ports:
      - "5173:5173"
    depends_on:
      app:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: marketwatcher-postgres
    environment:
      POSTGRES_DB: marketwatcher
      POSTGRES_USER: marketwatcher
      POSTGRES_PASSWORD: marketwatcher
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: marketwatcher-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: marketwatcher-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  redis_data:
